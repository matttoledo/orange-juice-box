version: '3.8'

services:
  verly-service:
    image: ghcr.io/verlao/verly-service:staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/verly_db
      - SPRING_DATASOURCE_USERNAME=verly_db_owner
    secrets:
      - source: verly_staging_db_password
        target: verly_db_password
    networks:
      - public_network
      - observability_monitoring_net
      - infrastructure_postgresql_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: start-first
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.15'
          memory: 256M
      labels:
        - "description=Verly Service API - Staging"
        - "environment=staging"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/verly-service/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=verly-service-staging"

  verly-frontend:
    image: ghcr.io/verlao/verly-erp-frontend:staging
    networks:
      - public_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
      labels:
        - "description=Verly ERP Frontend - Staging"
        - "environment=staging"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        labels: "service=verly-frontend-staging"

networks:
  public_network:
    external: true
  observability_monitoring_net:
    external: true
  infrastructure_postgresql_network:
    external: true

secrets:
  verly_staging_db_password:
    external: true
