version: '3.8'

services:
  verly-service:
    image: ghcr.io/verlao/verly-service:latest
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/verly_prod_db
      - SPRING_DATASOURCE_USERNAME=verly_prod_owner
    secrets:
      - source: verly_prod_db_password
        target: verly_db_password
    networks:
      - public_network
      - observability_monitoring_net
      - infrastructure_postgresql_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: start-first
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M
      labels:
        - "description=Verly Service - Production"
        - "environment=production"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/verly-service/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=verly-service"

networks:
  public_network:
    external: true
  observability_monitoring_net:
    external: true
  infrastructure_postgresql_network:
    external: true

secrets:
  verly_prod_db_password:
    external: true
