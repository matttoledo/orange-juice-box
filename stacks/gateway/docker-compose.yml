version: '3.8'

networks:
  public_network:
    external: true

services:
  # ========================================
  # CLOUDFLARE TUNNEL - Internet Gateway
  # ========================================
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest

    command: tunnel run --token ${TUNNEL_TOKEN}

    networks:
      - public_network

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

      labels:
        - "description=🌐 Cloudflare Tunnel - Secure Internet Gateway"
        - "category=gateway"
        - "layer=gateway"
        - "exposure=internet"
        - "status=production"
        - "tunnel-id=18d4763d-f0e7-4447-9799-40bc36858295"

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
