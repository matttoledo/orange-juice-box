version: '3.8'

networks:
  public_network:
    external: true
    name: public_network
  security_internal:
    driver: overlay
    attachable: true

volumes:
  crowdsec_config:
  crowdsec_data:
  modsecurity_logs:

services:
  # ========================================
  # CROWDSEC - IDS/IPS Threat Detection
  # ========================================
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    environment:
      - COLLECTIONS=crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/whitelist-good-actors crowdsecurity/linux
      - GID=1000
      - DISABLE_ONLINE_API=true
      - DISABLE_LOCAL_API=false

    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro

    networks:
      - security_internal
      - public_network

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      
      labels:
        - "description=🛡️ CrowdSec - IDS/IPS Threat Detection Engine"
        - "category=security"
        - "layer=security"
        - "component=ids-ips"

  # ========================================
  # MODSECURITY - Web Application Firewall
  # ========================================
  modsecurity:
    image: owasp/modsecurity-crs:nginx-alpine
    environment:
      - BACKEND=http://infrastructure_npm
      - PORT=8080
      - PARANOIA=2
      - BLOCKING_PARANOIA=2
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
      - PROXY_TIMEOUT=60s
      - TIMEOUT=60s
      - PROXY_SSL_VERIFY=off
      - PROXY_SSL_CHECK_PEER_NAME=off

    volumes:
      - modsecurity_logs:/var/log/modsec

    networks:
      - public_network
      - security_internal

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      
      labels:
        - "description=🛡️ ModSecurity WAF - OWASP CRS v4.19.0 (837 rules)"
        - "category=security"
        - "layer=security"
        - "component=waf"
        - "paranoia=2"
        - "rules=837"
