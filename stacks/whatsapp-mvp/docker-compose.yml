version: "3.8"

# WhatsApp MVP — Evolution API + Python orchestrator
# - Evolution API: driver WhatsApp Multi-Device (Baileys wrapper) com webhook global
# - Orchestrator: recebe webhook → classify+extract via rkllm-server (host:18080) → calc preço via verly-service
# - Persistência: schema whatsapp_bot dentro de verly_db existente
# - Evolution state: evolution_db separada na mesma instância Postgres

services:

  evolution-api:
    image: evoapicloud/evolution-api:latest
    networks:
      - whatsapp_mvp_net
      - public_network
      - infrastructure_postgresql_network
    ports:
      - target: 8080
        published: 18081
        protocol: tcp
        mode: host
    secrets:
      - source: whatsapp_evolution_api_key
        target: whatsapp_evolution_api_key
      - source: verly_prod_db_password
        target: verly_staging_db_password
    volumes:
      - evolution_instances:/evolution/instances
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        export AUTHENTICATION_API_KEY="$$(cat /run/secrets/whatsapp_evolution_api_key)"
        export DATABASE_CONNECTION_URI="postgresql://verly_db_owner:$$(cat /run/secrets/verly_staging_db_password)@postgresql:5432/evolution_db?schema=evolution_api"
        cd /evolution
        . ./Docker/scripts/deploy_database.sh
        exec npm run start:prod
    environment:
      SERVER_PORT: "8080"
      SERVER_URL: "http://localhost:8080"

      # Database
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_CLIENT_NAME: vidraria_bot
      # risk-mitigation: don't save messages/contacts/chats in Evolution's DB
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      DATABASE_DELETE_MESSAGE: "false"

      # Webhook global → orchestrator
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://orchestrator:8000/wa"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_SET: "false"
      WEBHOOK_EVENTS_MESSAGES_EDITED: "false"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_CONTACTS_SET: "false"
      WEBHOOK_EVENTS_CONTACTS_UPSERT: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_PRESENCE_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_SET: "false"
      WEBHOOK_EVENTS_CHATS_UPSERT: "false"
      WEBHOOK_EVENTS_CHATS_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_DELETE: "false"
      WEBHOOK_EVENTS_GROUPS_UPSERT: "false"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "false"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE_UPDATE: "false"
      WEBHOOK_EVENTS_LABELS_EDIT: "false"
      WEBHOOK_EVENTS_LABELS_ASSOCIATION: "false"
      WEBHOOK_EVENTS_CALL: "false"

      # Session (mimic a normal WhatsApp Web client)
      CONFIG_SESSION_PHONE_CLIENT: "Chrome"
      CONFIG_SESSION_PHONE_NAME: "Linux"

      # Cache: local (Redis disabled for MVP)
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"

      # Misc
      LANGUAGE: "pt-BR"
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "10"
      TELEMETRY_ENABLED: "false"
      LOG_LEVEL: "ERROR,WARN,INFO,LOG"
      LOG_BAILEYS: "error"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  orchestrator:
    # Live runs :latest (the verly-whatsapp-bot repo's own deploy job does
    # `docker service update --image :latest`). Kept in sync here so a stack
    # redeploy doesn't roll the image back.
    image: ghcr.io/verlao/verly-whatsapp-bot:latest
    networks:
      - whatsapp_mvp_net
      - public_network
      - infrastructure_postgresql_network
    secrets:
      - source: verly_prod_db_password
        target: verly_staging_db_password
      - source: verly_bot_username
        target: verly_bot_username
      - source: verly_bot_password
        target: verly_bot_password
      # LLM backend keys (ferraz primary token + openrouter/gemini fallback).
      - source: llm_api_key
        target: llm_api_key
      - source: openrouter_api_key
        target: openrouter_api_key
      # Evolution API key (used by the media fallback path).
      - source: whatsapp_evolution_api_key
        target: whatsapp_evolution_api_key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RKLLM_URL: "http://host.docker.internal:18080"
      VERLY_URL: "http://verly_verly-service:8080/verly-service"
      DB_USER: "verly_db_owner"
      DB_HOST: "postgresql"
      DB_PORT: "5432"
      DB_NAME: "verly_prod_db"
      LOG_LEVEL: "INFO"
      RKLLM_TIMEOUT_S: "30"
      VERLY_TIMEOUT_S: "10"

      # --- Extraction backend (captured from live; was set imperatively) ---
      # Current live state = openrouter/gemini. To switch to ferraz-primary +
      # gemini-fallback, flip EXTRACTION_BACKEND=ferraz + LLM_MODEL=qwen/qwen3.6-35b-a3b
      # ONCE the verly-whatsapp-bot image with cross-provider fallback (PR #29) is live.
      EXTRACTION_BACKEND: "openrouter"
      LLM_MODEL: "gpt-oss-20b"
      EXTRACTION_MODEL: "google/gemini-2.5-flash-lite"
      LLM_VISION_MODEL: "gpt-oss-20b"
      # Evolution API (media fallback path)
      EVOLUTION_URL: "http://evolution-api:8080"
      EVOLUTION_INSTANCE: "father"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

networks:
  whatsapp_mvp_net:
    driver: overlay
    attachable: true
  public_network:
    external: true
  infrastructure_postgresql_network:
    external: true

volumes:
  evolution_instances:
    name: whatsapp-mvp_evolution_instances
    labels:
      backup: critical

secrets:
  whatsapp_evolution_api_key:
    external: true
  verly_prod_db_password:
    external: true
  verly_bot_username:
    external: true
  verly_bot_password:
    external: true
  llm_api_key:
    external: true
  openrouter_api_key:
    external: true
