version: '3.8'

networks:
  public_network:
    external: true
  security_internal:
    external: true
    name: security_security_internal

volumes:
  modsecurity_logs:

services:
  modsecurity:
    image: owasp/modsecurity-crs:nginx-alpine
    environment:
      - BACKEND=http://infrastructure_npm
      - PORT=8080
      - PARANOIA=2
      - BLOCKING_PARANOIA=2
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
      - PROXY_TIMEOUT=60s
      - TIMEOUT=60s
      - PROXY_SSL_VERIFY=off
      - PROXY_SSL_CHECK_PEER_NAME=off

    volumes:
      - modsecurity_logs:/var/log/modsec

    networks:
      - public_network
      - security_internal

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      
      labels:
        - "description=🛡️ ModSecurity WAF - OWASP CRS (837 rules)"
        - "category=security"
        - "layer=waf"
        - "paranoia=2"
        - "rules=837"
