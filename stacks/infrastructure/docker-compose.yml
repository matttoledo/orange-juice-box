version: '3.8'

networks:
  postgresql_network:
    driver: overlay
    driver_opts:
      encrypted: "true"  # Zero Trust: encrypted traffic between services
    labels:
      - "description=Encrypted PostgreSQL network (Zero Trust)"

  redis_network:
    driver: overlay
    driver_opts:
      encrypted: "true"
    labels:
      - "description=Encrypted Redis network"

  traefik_public:
    external: true

  security_internal:
    external: true
    name: security_security_internal

volumes:
  postgresql_data:
    labels:
      - "description=PostgreSQL data (CRITICAL - daily backups required)"
      - "backup=daily"
      - "critical=true"

  redis_data:
    labels:
      - "description=Redis persistent data (AOF)"

  npm_data:
    labels:
      - "description=NPM configuration and database (if using SQLite)"
      - "backup=daily"

  npm_letsencrypt:
    labels:
      - "description=NPM Let's Encrypt certificates"
      - "backup=weekly"
      - "critical=true"

  npm_logs:
    labels:
      - "description=NPM access logs"

  modsecurity_logs:
    labels:
      - "description=ModSecurity audit logs"

  crowdsec_logs:
    labels:
      - "description=CrowdSec integration logs"

services:
  # ========================================
  # POSTGRESQL - Shared Database Server
  # ========================================
  postgresql:
    image: postgres:16-alpine

    environment:
      - POSTGRES_DB=verly_db
      - POSTGRES_USER=verly_db_owner
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./postgresql/init-scripts:/docker-entrypoint-initdb.d:ro

    networks:
      - postgresql_network

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

      # Beautiful Portainer Labels
      labels:
        - "description=🗄️ PostgreSQL 16 - Shared Database Server"
        - "category=infrastructure"
        - "layer=infrastructure"
        - "component=database"
        - "exposure=internal"
        - "status=production"
        - "version=16-alpine"
        - "critical=true"
        - "backup=daily"
        - "databases=verly_db,redash"
        - "connections=verly-service,redash"
        - "network-encryption=ipsec"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verly_db_owner -d verly_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================
  # REDIS - Cache Server (for Redash)
  # ========================================
  redis:
    image: redis:7-alpine

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    networks:
      - redis_network

    deploy:
      mode: replicated
      replicas: 1

      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

      # Portainer Labels
      labels:
        - "description=💾 Redis 7 - Cache Server (Redash & Future Apps)"
        - "category=infrastructure"
        - "layer=infrastructure"
        - "component=cache"
        - "exposure=internal"
        - "status=production"
        - "version=7-alpine"
        - "persistence=aof"
        - "connections=redash"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # NGINX PROXY MANAGER - Reverse Proxy
  # ========================================
  npm:
    image: npm-crowdsec-modsec:1.0.0

    ports:
      - "80:80"
      - "443:443"
      - "81:81"

    environment:
      # PostgreSQL Database (usando serviço local)
      - DB_POSTGRES_HOST=postgresql
      - DB_POSTGRES_PORT=5432
      - DB_POSTGRES_USER=npm_user
      - DB_POSTGRES_PASSWORD=gdc4QwsPiIJHienvZRZMOR7MJpzdNbi1
      - DB_POSTGRES_NAME=npm_db

      # Disable IPv6
      - DISABLE_IPV6=true

      # CrowdSec Integration (security-stack)
      - CROWDSEC_LAPI_URL=http://crowdsec:8080
      - CROWDSEC_LAPI_KEY=${CROWDSEC_BOUNCER_KEY}

    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
      - npm_logs:/var/log/nginx
      - modsecurity_logs:/var/log/modsecurity
      - crowdsec_logs:/var/log/crowdsec

    networks:
      - postgresql_network
      - traefik_public
      - security_internal

    depends_on:
      - postgresql

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first

      labels:
        - "description=🔐 Nginx Proxy Manager with CrowdSec & ModSecurity"
        - "category=infrastructure"
        - "layer=gateway"
        - "component=reverse-proxy"
        - "exposure=public"
        - "status=production"
        - "version=1.0.0"
        - "ports=80,443,81"
        - "security=crowdsec,modsecurity"
        - "database=postgresql"
        - "connections=all-services"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
