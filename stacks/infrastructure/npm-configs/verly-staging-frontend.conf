# Proxy para Verly Staging Frontend
# Usa resolver para não crashar se upstream não existir
server {
    listen 80;
    server_name staging-painel.verlyvidracaria.com;

    access_log /data/logs/staging-painel-verly-access.log;
    error_log /data/logs/staging-painel-verly-error.log;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $staging_frontend "verly-staging_verly-frontend:80";

    location / {
        proxy_pass http://$staging_frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 4k;
    }
}
