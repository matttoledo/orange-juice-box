# Proxy HTTP para Verly Staging API
# CORS gerenciado pelo Spring Boot (application-staging.yml)
server {
    listen 80;
    server_name staging-api.verlyvidracaria.com;

    access_log /data/logs/staging-api-verly-access.log;
    error_log /data/logs/staging-api-verly-error.log;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $staging_backend "verly-staging_verly-service:8080";

    location / {
        proxy_pass http://$staging_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
